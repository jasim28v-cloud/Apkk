name: 💖 Build File Vault APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📝 Generate Project Files
        run: |
          python scraper.py
          echo "=== Files generated ==="
          find . -name "*.gradle" -o -name "*.java" -o -name "*.xml" | head -20

      - name: 📂 Move Files to Root
        run: |
          if [ -d "FileVault" ]; then
            echo "Moving from FileVault/ to root..."
            cp -r FileVault/* . 2>/dev/null || true
            cp -r FileVault/.[!.]* . 2>/dev/null || true
            rm -rf FileVault
          fi
          echo "=== Root files ==="
          ls -la
          echo "=== Check gradlew ==="
          test -f gradlew && echo "gradlew EXISTS" || echo "gradlew MISSING"

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: 🔧 Make gradlew Executable
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "ERROR: gradlew not found!"
            exit 1
          fi

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug

      - name: 🏗️ Build Release APK
        run: ./gradlew assembleRelease

      - name: 📦 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FileVault-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: 📦 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FileVault-Release-APK
          path: app/build/outputs/apk/release/*.apk
