# ============================================
# SecureVault - GitHub Actions Workflow
# بناء تلقائي احترافي مع فحص الجودة
# ============================================

name: 🚀 Build & Test SecureVault

# ============ المشغلات التلقائية ============
on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# ============ المتغيرات العامة ============
env:
  APK_NAME: SecureVault
  JAVA_VERSION: '17'

# ============ المهام ============
jobs:
  
  # المهمة الأولى: فحص الكود
  lint:
    name: 🔍 فحص الكود
    runs-on: ubuntu-latest
    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v4
      
      - name: ☕ تثبيت Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: 🔍 فحص Lint
        run: ./gradlew lint
        continue-on-error: true
      
      - name: 📊 رفع تقرير Lint
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

  # المهمة الثانية: بناء الـ APK
  build:
    name: 📦 بناء APK
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [debug]
    
    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v4
      
      - name: ☕ تثبيت Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      # تخزين مؤقت لـ Gradle لتسريع البناء
      - name: ⚡ تهيئة الكاش
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: 🔑 إعطاء صلاحية gradlew
        run: chmod +x gradlew
      
      - name: 🏗️ بناء ${{ matrix.build-type }} APK
        run: ./gradlew assemble${{ matrix.build-type == 'debug' && 'Debug' || 'Release' }}
      
      # استخراج معلومات الـ APK
      - name: 📋 معلومات الـ APK
        id: apk_info
        run: |
          APK_PATH="app/build/outputs/apk/${{ matrix.build-type }}/app-${{ matrix.build-type }}.apk"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_size=$(du -h $APK_PATH | cut -f1)" >> $GITHUB_OUTPUT
      
      # رفع الـ APK كـ Artifact
      - name: 📤 رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}-${{ matrix.build-type }}-${{ github.sha }}
          path: ${{ steps.apk_info.outputs.apk_path }}
          retention-days: 30
      
      # عرض معلومات البناء
      - name: 📊 ملخص البناء
        run: |
          echo "🔧 نوع البناء: ${{ matrix.build-type }}"
          echo "📱 اسم APK: ${{ env.APK_NAME }}-${{ matrix.build-type }}"
          echo "📦 حجم APK: ${{ steps.apk_info.outputs.apk_size }}"
          echo "🔑 SHA: ${{ github.sha }}"
          echo "📅 التاريخ: $(date '+%Y-%m-%d %H:%M:%S')"

  # المهمة الثالثة: بناء الإصدار النهائي (فقط عند tag)
  release:
    name: 🎉 إصدار نهائي
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v4
      
      - name: ☕ تثبيت Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: 🔑 إعطاء صلاحية gradlew
        run: chmod +x gradlew
      
      - name: 🏗️ بناء Release APK
        run: ./gradlew assembleRelease
      
      - name: 📤 نشر الإصدار
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/app-release.apk
          name: 🎉 SecureVault ${{ github.ref_name }}
          body: |
            ## 🔒 SecureVault ${{ github.ref_name }}
            
            ### ✨ المميزات:
            - ✅ تشفير AES-256 للملفات
            - ✅ واجهة محادثة سهلة
            - ✅ إخفاء الملفات من المعرض
            - ✅ حماية بكلمة مرور
            
            ### 📱 التثبيت:
            1. حمل ملف APK
            2. فعل "مصادر غير معروفة"
            3. ثبت التطبيق
            4. استخدم الرمز: **1234**
            
            ### 🔧 متطلبات:
            - Android 7.0+
            - مساحة تخزين: 20MB
            
            ---
            *تم البناء تلقائياً بواسطة GitHub Actions*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # المهمة الرابعة: إرسال إشعار
  notify:
    name: 📧 إشعار
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📊 حالة البناء
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ البناء نجح!"
            echo "📱 حمل الـ APK من تبويب Actions"
          else
            echo "❌ فشل البناء"
            echo "🔍 راجع تقرير Lint للمشاكل"
          fi
      
      # يمكنك إضافة إشعارات Telegram/Discord هنا
      - name: 📨 إرسال لـ Telegram (اختياري)
        if: success() && secrets.TELEGRAM_BOT_TOKEN
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ بناء SecureVault ناجح!
            📱 الإصدار: ${{ github.ref_name }}
            🔗 الرابط: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
