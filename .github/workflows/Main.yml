name: 💖 Build & Sign File Vault APK

# ═══════════════════════════════════════════════════════════
# 💖 GITHUB ACTIONS - BUILD ANDROID APK
# ═══════════════════════════════════════════════════════════

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

# ═══════════════════════════════════════════════════════════
# 💖 ENVIRONMENT VARIABLES
# ═══════════════════════════════════════════════════════════

env:
  APPLICATION_ID: "com.zhare.filevault"
  APP_NAME: "File Vault"
  VERSION_CODE: "1"
  VERSION_NAME: "1.0.0"

# ═══════════════════════════════════════════════════════════
# 💖 JOBS
# ═══════════════════════════════════════════════════════════

jobs:
  
  # ──────────────────────────────────────────────
  # 🔍 JOB 1: فحص الكود
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Code Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: 🔧 Grant Execute Permission
        run: chmod +x gradlew
      
      - name: 🔍 Run Lint Check
        run: ./gradlew lint --stacktrace
      
      - name: 📊 Upload Lint Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html

  # ──────────────────────────────────────────────
  # 🏗️ JOB 2: بناء APK
  # ──────────────────────────────────────────────
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest
    needs: lint
    if: always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    
    strategy:
      matrix:
        arch: [universal]
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
      
      - name: 🔧 Grant Execute Permission
        run: chmod +x gradlew
      
      - name: 🏗️ Build Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.versionCode=${{ env.VERSION_CODE }} \
            -Pandroid.injected.versionName=${{ env.VERSION_NAME }}
      
      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug
      
      - name: 📦 Rename APK Files
        run: |
          # Release
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}-release.apk || true
          
          # Debug
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}-debug.apk || true
      
      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}-Release-APK
          path: |
            app/build/outputs/apk/release/*.apk
          retention-days: 30
      
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}-Debug-APK
          path: |
            app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ──────────────────────────────────────────────
  # ✍️ JOB 3: توقيع APK (اختياري)
  # ──────────────────────────────────────────────
  sign:
    name: ✍️ Sign APK
    runs-on: ubuntu-latest
    needs: build
    if: false  # قم بتفعيلها بوضع true إذا كان لديك Keystore
    
    steps:
      - name: 📥 Download APK from Build
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}-Release-APK
          path: apk/
      
      - name: ✍️ Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: apk/
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
      
      - name: 📤 Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}-Signed-APK
          path: apk/*-signed.apk
          retention-days: 90

  # ──────────────────────────────────────────────
  # 📦 JOB 4: إنشاء Release على GitHub
  # ──────────────────────────────────────────────
  release:
    name: 📦 Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}-Release-APK
          path: apk/
      
      - name: 📋 Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
      
      - name: 📝 Generate Changelog
        run: |
          echo "## 💖 ${{ env.APP_NAME }} v${{ env.VERSION_NAME }}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "📅 **تاريخ البناء:** ${{ steps.date.outputs.date }}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### 🎯 المميزات:" >> CHANGELOG.md
          echo "- 🔐 تشفير AES-256 للملفات" >> CHANGELOG.md
          echo "- 📱 واجهة تشبه واتساب" >> CHANGELOG.md
          echo "- 🔒 حماية بكلمة سر 1234" >> CHANGELOG.md
          echo "- 📁 تصفح جميع ملفات الجهاز" >> CHANGELOG.md
          echo "- 🎨 تصميم زهري فخم" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### 📥 التحميل:" >> CHANGELOG.md
          echo "قم بتحميل ملف APK من الأسفل 👇" >> CHANGELOG.md
      
      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.APP_NAME }} v${{ env.VERSION_NAME }} 💖"
          tag_name: "v${{ env.VERSION_NAME }}-${{ github.run_number }}"
          body_path: CHANGELOG.md
          files: |
            apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # 📢 JOB 5: إرسال إشعار (اختياري)
  # ──────────────────────────────────────────────
  notify:
    name: 📢 Send Notification
    runs-on: ubuntu-latest
    needs: [build, release]
    if: always()
    
    steps:
      - name: 📊 Build Summary
        run: |
          echo "╔════════════════════════════════════════════╗"
          echo "║  💖 BUILD SUMMARY                         ║"
          echo "╠════════════════════════════════════════════╣"
          echo "║  App: ${{ env.APP_NAME }}"
          echo "║  Version: ${{ env.VERSION_NAME }}"
          echo "║  Build: ${{ github.run_number }}"
          echo "║  Status: ${{ job.status }}"
          echo "╚════════════════════════════════════════════╝"
      
      # - name: 📧 Send Telegram Notification
      #   if: success()
      #   uses: appleboy/telegram-action@master
      #   with:
      #     to: ${{ secrets.TELEGRAM_CHAT_ID }}
      #     token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      #     message: |
      #       💖 BUILD SUCCESS!
      #       
      #       📱 App: ${{ env.APP_NAME }}
      #       📌 Version: ${{ env.VERSION_NAME }}
      #       🔢 Build: #${{ github.run_number }}
      #       
      #       📥 Download: ${{ github.server_url }}/${{ github.repository }}/releases
